<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZK - Pixel Rain</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; overflow: hidden; }
  canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    image-rendering: pixelated;
  }
  .content {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 2; pointer-events: none; text-align: center; color: white;
  }
  .content h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 50px; font-weight: 700; letter-spacing: -2px; line-height: 1.15;
  }
  .content p {
    font-size: 16px; color: rgba(255,255,255,0.4); font-weight: 300;
    margin-top: 16px; font-family: system-ui;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="content">
  <h1>Taste can't be automated.<br>But everything else can.</h1>
  <p>AI consulting, production, and training for brands.</p>
</div>

<script>
const COLORS = [
  [226,40,114],[136,200,236],[242,190,40],[240,112,48],[72,184,154],
  [24,146,74],[194,30,48],[60,32,104],[224,144,40],[122,88,130],[242,165,192]
];
function pick() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const PIXEL = 6;

let cols, rows;
const mouse = { x: -1000, y: -1000 };
document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

function resize() {
  const W = window.innerWidth, H = window.innerHeight;
  cols = Math.ceil(W / PIXEL); rows = Math.ceil(H / PIXEL);
  canvas.width = cols; canvas.height = rows;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
}
resize();
window.addEventListener('resize', resize);

// --- DROPS (exact original) ---
const drops = [];
for (let i = 0; i < 80; i++) {
  drops.push({
    x: Math.floor(Math.random() * 300),
    y: Math.floor(Math.random() * 200),
    color: pick(),
    speed: 0.15 + Math.random() * 0.4,
    size: 1,
    alpha: 0.2 + Math.random() * 0.4,
    bx: 0, by: 0, // blast velocity
  });
}

// --- SPARKS (from explosions, small array) ---
const sparks = [];

// --- CLICK ---
let shake = 0;
document.addEventListener('click', e => {
  const ex = e.clientX / PIXEL;
  const ey = e.clientY / PIXEL;

  // 8 small sparks, low velocity, fall down
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i + (Math.random() - 0.5) * 0.4;
    sparks.push({
      x: ex, y: ey,
      vx: Math.cos(angle) * 1.2,
      vy: Math.sin(angle) * 1.2,
      color: pick(),
      alpha: 0.2 + Math.random() * 0.4,
    });
  }

  // Big shockwave pushes all drops
  for (const d of drops) {
    const dx = d.x - ex, dy = d.y - ey;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 60 && dist > 0) {
      const force = (1 - dist / 60) * 4;
      d.bx += (dx / dist) * force;
      d.by += (dy / dist) * force;
    }
  }

  shake = 3;
});

// --- TRAIL BUFFER ---
let trailData = null;

function draw() {
  if (!trailData || trailData.length !== cols * rows * 4) {
    trailData = new Float32Array(cols * rows * 4);
  }

  const mx = mouse.x / PIXEL;
  const my = mouse.y / PIXEL;

  // Fade trail (original value)
  for (let i = 0; i < trailData.length; i += 4) {
    trailData[i]     *= 0.97;
    trailData[i + 1] *= 0.97;
    trailData[i + 2] *= 0.97;
  }

  // --- UPDATE SPARKS ---
  // Sparks burst out then become normal falling drops
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.vx *= 0.95;
    s.vy *= 0.95;
    s.vy += 0.008; // gravity gradually pulls them down
    s.x += s.vx;
    s.y += s.vy;

    // Once burst velocity dies, become a normal drop
    if (Math.abs(s.vx) < 0.05 && s.vy > 0) {
      // Convert to a real drop with normal rain speed
      drops.push({
        x: s.x, y: s.y,
        color: s.color, speed: 0.15 + Math.random() * 0.4,
        size: 1, alpha: s.alpha, bx: 0, by: 0,
      });
      sparks.splice(i, 1);
      continue;
    }

    // Stamp
    const px = Math.floor(s.x), py = Math.floor(s.y);
    if (px >= 0 && px < cols && py >= 0 && py < rows) {
      const idx = (py * cols + px) * 4;
      trailData[idx]     = Math.max(trailData[idx], s.color[0] * s.alpha);
      trailData[idx + 1] = Math.max(trailData[idx + 1], s.color[1] * s.alpha);
      trailData[idx + 2] = Math.max(trailData[idx + 2], s.color[2] * s.alpha);
    }

    // Remove if offscreen
    if (py > rows + 5 || px < -5 || px > cols + 5) {
      sparks.splice(i, 1);
    }
  }

  // --- UPDATE DROPS (original logic + blast) ---
  for (const d of drops) {
    // Blast velocity (from click shockwave)
    if (d.bx !== 0 || d.by !== 0) {
      d.x += d.bx;
      d.y += d.by;
      d.bx *= 0.92;
      d.by *= 0.92;
      if (Math.abs(d.bx) < 0.03 && Math.abs(d.by) < 0.03) {
        d.bx = 0; d.by = 0;
      }
    }

    d.y += d.speed;

    // Cursor push (original)
    const dx = d.x - mx, dy = d.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 18 && dist > 0) {
      const push = (1 - dist / 18) * 1.5;
      d.x += (dx / dist) * push;
      d.y += (dy / dist) * push * 0.5;
    }

    // Respawn (original)
    if (d.y >= rows) {
      d.y = -1;
      d.x = Math.floor(Math.random() * cols);
      d.color = pick();
      d.alpha = 0.2 + Math.random() * 0.4;
    }

    // Stamp pixel (original)
    const px = Math.floor(d.x);
    const py = Math.floor(d.y);
    if (px >= 0 && px < cols && py >= 0 && py < rows) {
      const idx = (py * cols + px) * 4;
      trailData[idx]     = Math.max(trailData[idx], d.color[0] * d.alpha);
      trailData[idx + 1] = Math.max(trailData[idx + 1], d.color[1] * d.alpha);
      trailData[idx + 2] = Math.max(trailData[idx + 2], d.color[2] * d.alpha);
    }
  }

  // --- RENDER (original) ---
  const imageData = ctx.createImageData(cols, rows);
  const data = imageData.data;
  for (let i = 0; i < cols * rows; i++) {
    const pi = i * 4;
    data[pi]     = Math.min(255, Math.round(10 + trailData[pi]));
    data[pi + 1] = Math.min(255, Math.round(10 + trailData[pi + 1]));
    data[pi + 2] = Math.min(255, Math.round(10 + trailData[pi + 2]));
    data[pi + 3] = 255;
  }
  ctx.putImageData(imageData, 0, 0);

  // --- SHAKE (canvas only) ---
  if (shake > 0.2) {
    canvas.style.transform = `translate(${(Math.random()-.5)*shake}px,${(Math.random()-.5)*shake}px)`;
    shake *= 0.85;
  } else if (shake > 0) {
    canvas.style.transform = '';
    shake = 0;
  }

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
